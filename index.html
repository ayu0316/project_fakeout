<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專題成果展示入口</title>
　　<link rel="icon" href="./logo.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans TC', 'Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        /* 使用主題色設計的律動漸層背景 */
        body {
            /* 加入透明度，讓色彩變淡雅 */
            background: linear-gradient(-45deg, 
                rgba(114, 154, 192, 0.25), 
                rgba(237, 233, 158, 0.25), 
                rgba(210, 117, 117, 0.25),
                rgba(114, 154, 192, 0.2)
            );
            background-size: 400% 400%;
            animation: themeGradient 12s ease infinite;
        }

        @keyframes themeGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 幻燈片淡入淡出效果 */
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
        .slide.active {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between items-center px-6 py-12 text-slate-800">

    <div class="w-full max-w-5xl flex justify-between items-center opacity-60 mb-6">
        <span class="text-xs tracking-widest uppercase font-bold text-slate-500">PROJECT_FAKEOUT</span>
        <span class="text-xs font-medium">JUN. 2026</span>
    </div>

    <main class="w-full max-w-5xl flex flex-col items-center justify-center my-auto">
        
        <div class="text-center mb-12">
            <p class="text-sm font-bold text-indigo-600 tracking-widest mb-3 bg-white/50 px-4 py-1 rounded-full inline-block shadow-sm">FINAL PRESENTATION</p>

            </h1>
            <p class="text-slate-600/80 text-base max-w-lg mx-auto leading-relaxed font-medium">
                › 你，是否對網路上跨大不實的資訊感到反感？<br>
		› 你，是否對媒體上亂吹牛皮的新聞感到厭倦？<br>
		› 你，是否對家人會隨時傳給你海量莫名連結<br>
		› 但一看就是在唬爛的訊息而破防無法自己？<br><br>

		› 如果你有以上煩惱，那來對地方了...... ⛶<br>
		› 這裡是【視緋對錯】，屬於你的查證超人

            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full">
            
            <!-- 1. 電子書手冊卡片 -->
            <a href="./ebook.html" class="group block w-full">
                <div class="glass-card rounded-[2.5rem] p-7 shadow-2xl transition-all duration-500 transform hover:-translate-y-3 hover:shadow-indigo-200/50 h-full flex flex-col">
                    <div class="relative w-full aspect-[4/3] rounded-3xl overflow-hidden shadow-inner bg-white/40 mb-7 border border-white/50">
                        <img 
                            src="img/封面.jpg" 
                            onerror="this.src='https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&q=80&w=1000'" 
                            alt="手冊封面" 
                            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                        >
                        <div class="absolute inset-0 bg-slate-900/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <span class="text-white text-sm font-bold bg-indigo-600 px-5 py-2 rounded-full shadow-lg">開啟手冊</span>
                        </div>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 transition-colors duration-300 group-hover:text-indigo-600 mb-2">專題手冊</h2>
                    <p class="text-slate-500 font-medium">點擊進入電子書介面</p>
                    <div class="flex justify-end mt-auto pt-6">
                        <div class="w-12 h-12 rounded-2xl bg-white group-hover:bg-indigo-600 flex items-center justify-center transition-all duration-300 shadow-md">
                            <i class="fa-solid fa-book-open text-indigo-500 group-hover:text-white transition-colors"></i>
                        </div>
                    </div>
                </div>
            </a>

            <!-- 2. 影片幻燈片卡片 -->
                <a href="./video.html" class="group block w-full">
                <div class="glass-card rounded-[2.5rem] p-7 shadow-2xl transition-all duration-500 transform hover:-translate-y-3 hover:shadow-rose-200/50 h-full flex flex-col">
                    <!-- 比例調整為 1080 x 1345 -->
                    <div class="relative w-full aspect-[1080/1345] rounded-3xl overflow-hidden shadow-inner bg-slate-900 mb-7 border border-white/50">
                        <!-- 幻燈片容器 (001~008) -->
                        <div id="slideshow" class="absolute inset-0">
                            <!-- 💡 提示：如果你的圖片副檔名是 .png，請把下面的 .jpg 全部改為 .png -->
                            <img src="./影片封面/封面-01.png" class="slide active">
                            <img src="./影片封面/封面-02.png" class="slide">
                            <img src="./影片封面/封面-03.png" class="slide">
                            <img src="./影片封面/封面-04.png" class="slide">
                            <img src="./影片封面/封面-05.png" class="slide">
                            <img src="./影片封面/封面-06.png" class="slide">
                            <img src="./影片封面/封面-07.png" class="slide">
                            <img src="./影片封面/封面-08.png" class="slide">
                        </div>
                        
                        <!-- 懸停時才顯示的紅色播放影片按鈕，平時隱藏不擋住幻燈片封面 -->
                        <div class="absolute inset-0 z-10 bg-slate-900/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <span class="text-white text-sm font-bold bg-rose-500 px-5 py-2 rounded-full shadow-lg">播放影片</span>
                        </div>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 transition-colors duration-300 group-hover:text-rose-600 mb-2">成果展示影片</h2>
                    <p class="text-slate-500 font-medium">觀看影片</p>
                    <div class="flex justify-end mt-auto pt-6">
                        <div class="w-12 h-12 rounded-2xl bg-white group-hover:bg-rose-500 flex items-center justify-center transition-all duration-300 shadow-md">
                            <i class="fa-solid fa-video text-rose-500 group-hover:text-white transition-colors"></i>
                        </div>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <footer class="w-full max-w-5xl text-center text-[10px] tracking-widest font-bold text-slate-400 mt-12 border-t border-white/30 pt-8 uppercase">
        © 2026 TOPIC GROUP ONE EXHIBITION.
    </footer>

    <script>
        // --- 幻燈片控制邏輯 ---
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        
        function nextSlide() {
            // 移除當前圖片的 active 狀態
            slides[currentSlide].classList.remove('active');
            // 計算下一張圖片索引
            currentSlide = (currentSlide + 1) % slides.length;
            // 顯示下一張圖片
            slides[currentSlide].classList.add('active');
        }
        
        // 設定每 5 秒切換一次
        setInterval(nextSlide, 3000);
    </script>
</body>
</html>
